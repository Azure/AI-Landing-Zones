site_name: Azure AI Landing Zones
site_description: Documentation for Azure AI Landing Zones
site_author: Microsoft
repo_url: https://github.com/Azure/AI-Landing-Zones
theme:
  name: material
  custom_dir: overrides
  language: en
  logo: media/logo.svg
  favicon: media/logo.svg
  palette:
    scheme: default
  features:
    - content.icon
    - content.iconify
    - navigation.tracking
    - toc.integrate
    - content.code.annotate
    - navigation.top
plugins:
  - search
  - macros
markdown_extensions:
  - admonition
  - attr_list
  - tables
  - md_in_html
  - sane_lists
  - mdx_truly_sane_lists
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
nav:
  - Home: index.md
  - What's New: whatisnew.md
  - Architecture:
      - "Design Checklist": architecture/design-checklist.md
      - "Cost Guide": architecture/cost-guide.md
      - "FAQ": architecture/faq.md
  - Bicep Implementation:
      - "Overview": bicep/overview.md
      - "Deployed Resources & Cost": bicep/deployed-resources.md
      - "How to Deploy": bicep/how-to-deploy.md
      - "Deploy with Azure DevOps": bicep/deploy-with-azure-devops.md
      - "Regional Considerations": bicep/regional-considerations.md
      - "Hub-and-Spoke Topology": bicep/hub-and-spoke.md
      - "Public Ingress (App Gateway)": bicep/public-ingress.md
      - "Permissions": bicep/permissions.md
      - "Parameterization": bicep/parameterization.md
      - "Building Accelerators (Submodule Pattern)": bicep/accelerator-pattern.md
  - Terraform Implementation: terraform/index.md
  - Portal installation: portal/index.md  
extra:
  generator: false

extra_css:
  - stylesheets/extra.css
