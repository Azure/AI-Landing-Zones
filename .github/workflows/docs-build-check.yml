name: Docs Build Check

# Build-only validation for the MkDocs site on pull requests targeting main.
# This complements deploy-docs.yml (which deploys on push to main) by catching
# broken docs before they merge. It never deploys and needs no write access.

on:
  pull_request:
    branches:
      - main
    paths:
      - docs/**
      - overrides/**
      - mkdocs.yml
      - requirements-docs.txt
      - main.py
      - .github/workflows/docs-build-check.yml

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.11

      - name: Install MkDocs and dependencies
        run: pip install -r requirements-docs.txt

      # Strict build: the docs tree is clean of warnings, so --strict is enabled
      # to catch any new issues (broken links, pages not in nav, bad image paths)
      # before they merge. The intentionally off-nav pages are listed under
      # not_in_nav in mkdocs.yml so they do not trip the check.
      - name: Build documentation
        run: mkdocs build --strict
